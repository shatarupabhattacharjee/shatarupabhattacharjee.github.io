<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Shatarupa's Artree</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            background: linear-gradient(135deg, var(--primary-coral), var(--primary-gold));
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .admin-section {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .upload-form {
            display: grid;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-brown);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 1rem;
            border: 2px solid var(--cream-bg);
            border-radius: 8px;
            font-family: var(--primary-font);
            font-size: 1rem;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-coral);
        }
        .btn-admin {
            background: var(--primary-coral);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-family: var(--secondary-font);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-admin:hover {
            background: var(--primary-teal);
            transform: translateY(-2px);
        }
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .stock-item {
            background: var(--light-cream);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .stock-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .stock-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        .stock-item h3 {
            color: var(--dark-brown);
            margin-bottom: 0.5rem;
        }
        .stock-item .price {
            color: var(--primary-coral);
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .stock-item .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .status.available {
            background: var(--soft-green);
            color: white;
        }
        .status.sold {
            background: var(--primary-coral);
            color: white;
        }
        .stock-actions {
            display: flex;
            gap: 1rem;
        }
        .btn-small {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn-edit {
            background: var(--primary-teal);
            color: white;
        }
        .btn-delete {
            background: var(--warm-orange);
            color: white;
        }
        .btn-toggle {
            background: var(--primary-gold);
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: linear-gradient(135deg, var(--primary-coral), var(--primary-teal));
            color: white;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-palette"></i> Admin Dashboard</h1>
            <p>Manage your artwork inventory</p>
        </div>

        <!-- Statistics Section -->
        <div class="admin-section">
            <h2><i class="fas fa-chart-bar"></i> Inventory Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalItems">0</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="availableItems">0</div>
                    <div class="stat-label">Available</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="soldItems">0</div>
                    <div class="stat-label">Sold</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalValue">₹0</div>
                    <div class="stat-label">Total Value</div>
                </div>
            </div>
        </div>

        <!-- Upload New Artwork Section -->
        <div class="admin-section">
            <h2><i class="fas fa-plus-circle"></i> Add New Artwork</h2>
            <form class="upload-form" id="uploadForm">
                <div class="form-group">
                    <label for="artworkTitle">Artwork Title</label>
                    <input type="text" id="artworkTitle" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="artworkCategory">Category</label>
                    <select id="artworkCategory" name="category" required>
                        <option value="">Select Category</option>
                        <option value="paintings">Paintings</option>
                        <option value="crochet">Crochet Purses</option>
                        <option value="resin">Resin Art</option>
                        <option value="custom">Custom Orders</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="artworkPrice">Price (₹)</label>
                    <input type="number" id="artworkPrice" name="price" required>
                </div>
                
                <div class="form-group">
                    <label for="artworkDescription">Description</label>
                    <textarea id="artworkDescription" name="description" rows="4" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="artworkImage">Image File</label>
                    <input type="file" id="artworkImage" name="image" accept="image/*" required>
                </div>
                
                <div class="form-group">
                    <label for="artworkStatus">Status</label>
                    <select id="artworkStatus" name="status" required>
                        <option value="available">Available</option>
                        <option value="sold">Sold</option>
                        <option value="custom-order">Custom Order</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-admin">
                    <i class="fas fa-upload"></i> Add Artwork
                </button>
            </form>
        </div>

        <!-- Current Stock Section -->
        <div class="admin-section">
            <h2><i class="fas fa-box"></i> Current Stock</h2>
            <div class="stock-grid" id="stockGrid">
                <!-- Stock items will be dynamically loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Sample stock data - in real implementation, this would come from a database
        let stockData = [
            {
                id: 1,
                title: "Floral Beauty",
                category: "paintings",
                price: 3500,
                description: "Beautiful floral painting with vibrant colors",
                image: "artwork/sold_Floral2.jpg",
                status: "sold"
            },
            {
                id: 2,
                title: "Elegant Blue Purse",
                category: "crochet",
                price: 1200,
                description: "Handcrafted blue crochet purse with elegant design",
                image: "artwork/Crochet/20260305_094919.jpg",
                status: "available"
            },
            {
                id: 3,
                title: "Abstract Expression",
                category: "paintings",
                price: 4500,
                description: "Modern abstract painting with bold strokes",
                image: "artwork/paintings_20240629_093753.jpg",
                status: "available"
            }
        ];

        // Initialize dashboard
        function initDashboard() {
            updateStatistics();
            displayStockItems();
        }

        // Update statistics
        function updateStatistics() {
            const totalItems = stockData.length;
            const availableItems = stockData.filter(item => item.status === 'available').length;
            const soldItems = stockData.filter(item => item.status === 'sold').length;
            const totalValue = stockData
                .filter(item => item.status === 'available')
                .reduce((sum, item) => sum + item.price, 0);

            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('availableItems').textContent = availableItems;
            document.getElementById('soldItems').textContent = soldItems;
            document.getElementById('totalValue').textContent = `₹${totalValue.toLocaleString()}`;
        }

        // Display stock items
        function displayStockItems() {
            const stockGrid = document.getElementById('stockGrid');
            stockGrid.innerHTML = '';

            stockData.forEach(item => {
                const stockItem = document.createElement('div');
                stockItem.className = 'stock-item';
                stockItem.innerHTML = `
                    <img src="${item.image}" alt="${item.title}">
                    <h3>${item.title}</h3>
                    <div class="price">₹${item.price.toLocaleString()}</div>
                    <span class="status ${item.status}">${item.status.replace('-', ' ').toUpperCase()}</span>
                    <p>${item.description}</p>
                    <div class="stock-actions">
                        <button class="btn-small btn-edit" onclick="editItem(${item.id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn-small btn-toggle" onclick="toggleStatus(${item.id})">
                            <i class="fas fa-exchange-alt"></i> Toggle Status
                        </button>
                        <button class="btn-small btn-delete" onclick="deleteItem(${item.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                `;
                stockGrid.appendChild(stockItem);
            });
        }

        // Add new artwork
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newItem = {
                id: stockData.length + 1,
                title: document.getElementById('artworkTitle').value,
                category: document.getElementById('artworkCategory').value,
                price: parseInt(document.getElementById('artworkPrice').value),
                description: document.getElementById('artworkDescription').value,
                image: document.getElementById('artworkImage').files[0]?.name || 'placeholder.jpg',
                status: document.getElementById('artworkStatus').value
            };

            stockData.push(newItem);
            updateStatistics();
            displayStockItems();
            
            // Reset form
            this.reset();
            
            alert('Artwork added successfully!');
        });

        // Edit item
        function editItem(id) {
            const item = stockData.find(item => item.id === id);
            if (item) {
                document.getElementById('artworkTitle').value = item.title;
                document.getElementById('artworkCategory').value = item.category;
                document.getElementById('artworkPrice').value = item.price;
                document.getElementById('artworkDescription').value = item.description;
                document.getElementById('artworkStatus').value = item.status;
                
                // Scroll to form
                document.querySelector('.upload-form').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Toggle status
        function toggleStatus(id) {
            const item = stockData.find(item => item.id === id);
            if (item) {
                item.status = item.status === 'available' ? 'sold' : 'available';
                updateStatistics();
                displayStockItems();
            }
        }

        // Delete item
        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                stockData = stockData.filter(item => item.id !== id);
                updateStatistics();
                displayStockItems();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
